spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: smart-campus-operations-hub
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/scoh}
      database: ${MONGODB_DATABASE:scoh}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - openid
              - profile
              - email
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:8081}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5174}
  oauth2:
    success-redirect-url: ${OAUTH_SUCCESS_REDIRECT_URL:http://localhost:5174/auth/callback}
    logout-redirect-url: ${OAUTH_LOGOUT_REDIRECT_URL:http://localhost:5174/}
  bootstrap:
    admin-email: ${BOOTSTRAP_ADMIN_EMAIL:mklskodithuwakku@gmail.com}
    default-user-email: ${BOOTSTRAP_DEFAULT_USER_EMAIL:kmls19kodituwakku@gmail.com}
